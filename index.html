<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise - Personal Expense Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/192/2489/2489756.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 font-sans min-h-screen pb-12 transition-colors duration-200">

    <nav class="bg-emerald-600 dark:bg-emerald-800 text-white shadow-md px-6 py-4 mb-8 transition-colors duration-200">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">💰 SpendWise</h1>
            <div class="flex items-center gap-3">
                <button id="themeToggleBtn" onclick="toggleDarkMode()" class="p-2 rounded-lg bg-emerald-700 dark:bg-emerald-900 hover:bg-emerald-800 dark:hover:bg-emerald-950 transition text-sm flex items-center justify-center min-w-[36px] min-h-[36px]" title="Toggle Dark Mode">
                    🌙
                </button>
                <span class="text-sm bg-emerald-700 dark:bg-emerald-900 px-3 py-1.5 rounded-full font-medium">LKR Mode</span>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="space-y-6 lg:col-span-1">
            <div class="bg-white dark:bg-slate-900 p-6 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 transition-colors duration-200">
                <h2 class="text-lg font-semibold mb-4 text-slate-700 dark:text-slate-200">Set Monthly Budget (LKR)</h2>
                <div class="flex gap-2">
                    <input type="number" id="monthlyBudgetInput" placeholder="Enter Budget in Rs." class="w-full px-3 py-2 border rounded-lg focus:outline-emerald-500 dark:bg-slate-800 dark:border-slate-700 dark:text-white dark:placeholder-slate-500">
                    <button onclick="updateBudget()" class="bg-emerald-600 dark:bg-emerald-700 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 dark:hover:bg-emerald-600 transition">Save</button>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900 p-6 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 transition-colors duration-200">
                <h2 class="text-lg font-semibold mb-4 text-slate-700 dark:text-slate-200">Log New Expense</h2>
                <form id="expenseForm" onsubmit="addExpense(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 uppercase mb-1">Amount (Rs.)</label>
                        <input type="number" step="0.01" id="amount" required class="w-full px-3 py-2 border rounded-lg focus:outline-emerald-500 dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 uppercase mb-1">Category</label>
                        <select id="category" onchange="handleCategoryChange()" class="w-full px-3 py-2 border rounded-lg focus:outline-emerald-500 dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                            <option value="Food & Dining">Food & Dining</option>
                            <option value="Rent & Bills">Rent & Bills</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Transportation">Transportation</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <div id="customCategoryWrapper" class="hidden">
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 uppercase mb-1">Specify Expense Type</label>
                        <input type="text" id="customCategory" placeholder="e.g., Medical, Insurance" class="w-full px-3 py-2 border rounded-lg border-emerald-300 focus:outline-emerald-500 bg-emerald-50/30 dark:bg-emerald-950/20 dark:border-emerald-800 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 uppercase mb-1">Date (YYYY-MM-DD)</label>
                        <input type="date" id="date" required class="w-full px-3 py-2 border rounded-lg focus:outline-emerald-500 dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 uppercase mb-1">Note / Description</label>
                        <input type="text" id="note" placeholder="e.g., Grocery store" class="w-full px-3 py-2 border rounded-lg focus:outline-emerald-500 dark:bg-slate-800 dark:border-slate-700 dark:text-white dark:placeholder-slate-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 uppercase mb-1">Attach Bill Receipt (Optional)</label>
                        <input type="file" id="billImageInput" accept="image/*" onchange="processImageUpload(event)" class="w-full text-xs text-slate-500 dark:text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-emerald-50 dark:file:bg-emerald-950/50 file:text-emerald-700 dark:file:text-emerald-400 hover:file:bg-emerald-100 cursor-pointer">
                        <p class="text-[10px] text-slate-400 dark:text-slate-500 mt-1">Images compress automatically to save device space.</p>
                    </div>
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 dark:bg-slate-700 dark:hover:bg-slate-600 text-white py-2.5 rounded-lg font-medium transition">Add Transaction</button>
                </form>
            </div>

            <div class="bg-white dark:bg-slate-900 p-6 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 transition-colors duration-200">
                <h2 class="text-lg font-semibold mb-2 text-slate-700 dark:text-slate-200">📋 Bill Reminders</h2>
                <p class="text-xs text-slate-400 dark:text-slate-500 mb-4">Track upcoming recurring utilities and invoices.</p>
                <form id="billForm" onsubmit="addBill(event)" class="flex gap-2 mb-4">
                    <input type="text" id="billName" placeholder="Bill name" required class="w-full text-sm px-3 py-1.5 border rounded-lg focus:outline-emerald-500 dark:bg-slate-800 dark:border-slate-700 dark:text-white dark:placeholder-slate-500">
                    <input type="date" id="billDate" required class="text-sm px-2 py-1.5 border rounded-lg focus:outline-emerald-500 dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                    <button type="submit" class="bg-emerald-600 dark:bg-emerald-700 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-emerald-700 transition">Add</button>
                </form>
                <ul id="billList" class="space-y-2 max-h-48 overflow-y-auto">
                    </ul>
            </div>
        </div>

        <div class="space-y-6 lg:col-span-2">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 transition-colors duration-200 flex flex-col justify-between">
                    <div>
                        <p class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Total Expenditures</p>
                        <h3 class="text-3xl font-bold text-slate-800 dark:text-slate-100 mt-1" id="totalSpentDisplay">Rs. 0.00</h3>
                    </div>
                    <div class="mt-4">
                        <div class="flex justify-between text-xs text-slate-500 dark:text-slate-400 mb-1">
                            <span>Budget Progress</span>
                            <span id="budgetPercent">0%</span>
                        </div>
                        <div class="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full overflow-hidden">
                            <div id="budgetBar" class="bg-emerald-500 h-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="bg-white dark:bg-slate-900 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 transition-colors duration-200 flex items-center justify-center">
                    <div class="w-full max-w-[240px]">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 transition-colors duration-200 flex flex-wrap gap-3 items-center justify-between">
                <div class="flex items-center gap-2">
                    <select id="reportRange" class="px-3 py-1.5 border rounded-lg text-sm focus:outline-emerald-500 dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                        <option value="7">Past 7 Days</option>
                        <option value="30" selected>Past 30 Days</option>
                        <option value="all">All Time</option>
                    </select>
                    <button onclick="generatePDF()" class="bg-rose-600 text-white px-4 py-1.5 rounded-lg text-sm font-medium hover:bg-rose-700 transition shadow-sm">📥 Download PDF Report</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportCSV()" class="text-xs bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 px-3 py-1.5 rounded-lg border dark:border-slate-700 transition">Export CSV</button>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 transition-colors duration-200 overflow-hidden">
                
                <div class="p-4 bg-slate-50/60 dark:bg-slate-800/40 border-b border-slate-100 dark:border-slate-800 flex flex-col sm:flex-row gap-3 items-center justify-between">
                    <span class="text-sm font-bold text-slate-700 dark:text-slate-300">📅 Daily History Ledger</span>
                    <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                        <input type="text" id="ledgerSearch" oninput="renderLedger()" placeholder="🔍 Search descriptions..." class="text-xs px-3 py-2 border rounded-lg focus:outline-emerald-500 flex-1 sm:w-48 dark:bg-slate-800 dark:border-slate-700 dark:text-white dark:placeholder-slate-500">
                        <select id="ledgerCategoryFilter" onchange="renderLedger()" class="text-xs px-2 py-2 border rounded-lg focus:outline-emerald-500 dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                            <option value="All">All Categories</option>
                            <option value="Food & Dining">Food & Dining</option>
                            <option value="Rent & Bills">Rent & Bills</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Transportation">Transportation</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                </div>

                <div id="ledgerAccordionContainer" class="divide-y divide-slate-100 dark:divide-slate-800 max-h-[450px] overflow-y-auto">
                    </div>
            </div>

            <div class="pt-2 flex justify-end">
                <button onclick="resetAppDatabase()" class="text-xs text-slate-400 dark:text-slate-500 hover:text-rose-500 transition underline decoration-dotted">Purge Database (Reset All Data)</button>
            </div>

        </div>
    </div>

    <div id="receiptModal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 p-4 rounded-xl max-w-md w-full relative shadow-2xl transition-colors duration-200">
            <button onclick="closeReceiptModal()" class="absolute top-3 right-3 text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 text-xl font-bold p-1 bg-slate-100 dark:bg-slate-800 rounded-full h-8 w-8 flex items-center justify-center">✕</button>
            <h3 class="text-md font-bold text-slate-700 dark:text-slate-200 mb-3">Attached Bill Receipt</h3>
            <div class="w-full bg-slate-50 dark:bg-slate-950 rounded-lg overflow-hidden border dark:border-slate-800 flex items-center justify-center p-2 min-h-[250px]">
                <img id="modalReceiptImg" src="" alt="Receipt Canvas" class="max-w-full max-h-[70vh] rounded shadow-sm object-contain">
            </div>
        </div>
    </div>

    <div style="position: absolute; left: -9999px; top: 0; width: 790px;">
        <div id="pdfTemplate" class="p-12 bg-white text-slate-800 font-sans">
            <div style="border-bottom: 2px solid #059669; padding-bottom: 20px; margin-bottom: 20px;">
                <h1 style="font-size: 28px; font-weight: bold; color: #059669; margin:
